name: 'codiff action'
description: 'Post a structural call-graph diff as a comment on every pull request'
author: 'issahammoud'

branding:
  icon: 'git-pull-request'
  color: 'green'

inputs:
  token:
    description: 'GitHub token with pull-requests: write permission'
    required: false
    default: ${{ github.token }}
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  silent-on-empty:
    description: 'Stay silent when there are no structural changes'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore codiff index cache
      uses: actions/cache@v4
      with:
        path: .codiff.db
        key: codiff-${{ github.event.pull_request.base.sha }}
        restore-keys: codiff-

    - name: Install codiff
      run: pip install codiff
      shell: bash

    - name: Generate structural diff
      id: diff
      run: |
        STDERR_FILE="$RUNNER_TEMP/codiff_stderr.txt"

        run_codiff() {
          codiff diff \
            --repo . \
            --base ${{ github.event.pull_request.base.sha }} \
            --head ${{ github.event.pull_request.head.sha }} \
            --format "$1" 2>"$STDERR_FILE"
        }

        if ! run_codiff mermaid > "$RUNNER_TEMP/codiff_diagram.txt"; then
          echo "::warning::codiff failed, retrying with a clean index: $(cat $STDERR_FILE)"
          rm -f .codiff.db
          run_codiff mermaid > "$RUNNER_TEMP/codiff_diagram.txt" || true
        fi

        OUTPUT=$(cat "$RUNNER_TEMP/codiff_diagram.txt")
        if [ -z "$(echo "$OUTPUT" | tr -d '[:space:]')" ]; then
          echo "empty=true" >> "$GITHUB_OUTPUT"
        else
          echo "empty=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Post or update PR comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs');
          const path = require('path');

          const empty = '${{ steps.diff.outputs.empty }}' === 'true';
          const silentOnEmpty = '${{ inputs.silent-on-empty }}' === 'true';
          const marker = '<!-- codiff-action -->';

          const prBody = context.payload.pull_request.body || '';
          const prBodyStripped = prBody
            .replace(/```[\s\S]*?```/g, '')
            .replace(/`[^`]*`/g, '');
          if (prBodyStripped.includes('<!-- codiff-mermaid -->')) return;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (empty && silentOnEmpty) {
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
            return;
          }

          const title = '### Structural diff (generated with [codiff](https://github.com/issahammoud/codiff))';
          let body;
          if (empty) {
            body = `${title}\n\nNo structural changes detected.\n${marker}`;
          } else {
            const diagramPath = path.join(process.env.RUNNER_TEMP, 'codiff_diagram.txt');
            const diagram = fs.readFileSync(diagramPath, 'utf8').trim();

            body = `${title}\n\n${diagram}\n${marker}`;
          }

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
